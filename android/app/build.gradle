plugins {
    id "com.android.application"
    id "org.jetbrains.kotlin.android"
    id "dev.flutter.flutter-gradle-plugin"
}

android {
    namespace "ir.abtin.navigator"
    compileSdk 35

    defaultConfig {
        applicationId "ir.abtin.navigator"
        minSdk 24
        targetSdk 35
        versionCode 1
        versionName "1.0"
        multiDexEnabled true
    }

    packagingOptions {
        jniLibs {
            useLegacyPackaging true
        }
    }
}

flutter {
    source "../.."
}
