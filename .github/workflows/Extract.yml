name: Extract ZIP Keep Both

on:
  workflow_dispatch:

jobs:
  extract:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract ZIP
        run: |
          mkdir extracted
          unzip -o *.zip -d extracted

      - name: Copy extracted files
        run: |
          cp -r extracted/* .

      - name: Commit changes
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"

          git add .
          git commit -m "Extract zip files" || echo "No changes"
          git push
