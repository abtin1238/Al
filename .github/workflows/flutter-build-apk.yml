name: build

on:
  push:
    branches: ['**']
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.0'
          channel: stable
          cache: true

      # پروژه به‌صورت یک فایل zip در ریشه‌ی ریپو قرار دارد.
      # این مرحله آن را استخراج می‌کند و اگر داخل یک پوشه‌ی تودرتو بود،
      # محتوایش را یک سطح بالا می‌آورد تا pubspec.yaml مستقیماً در extracted/ باشد.
      - name: Extract project from zip
        run: |
          mkdir -p extracted
          unzip -oq *.zip -d extracted
          if [ ! -f extracted/pubspec.yaml ]; then
            inner_dir=$(find extracted -maxdepth 1 -mindepth 1 -type d | head -n 1)
            if [ -f "$inner_dir/pubspec.yaml" ]; then
              mv "$inner_dir"/* extracted/
            fi
          fi
          test -f extracted/pubspec.yaml || (echo "pubspec.yaml not found in zip" && exit 1)

      # پوشه‌های android/ios را با نسخه‌ی نصب‌شده‌ی فلاتر همگام و بازتولید می‌کند
      # (هر چه از قبل داخل زیپ باشد اینجا override می‌شود، این طبیعی و بی‌خطر است).
      - name: Generate platform folders
        working-directory: extracted
        run: flutter create --platforms=android,ios --org ir.abtin --project-name abtin_navigator .

      - name: Get dependencies
        working-directory: extracted
        run: flutter pub get

      - name: Build APK (release)
        working-directory: extracted
        run: flutter build apk --release --no-tree-shake-icons

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: navi-app-release
          path: extracted/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 14
