name: Build Flutter APK

on:
  workflow_dispatch:
  push:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show files
        run: |
          ls -la

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.24.0"

      - name: Extract ZIP
        run: |
          unzip -o abtin_navigator.zip -d project

      - name: Build
        working-directory: project/abtin_navigator
        run: |
          flutter pub get
          flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: apk
          path: project/abtin_navigator/build/app/outputs/flutter-apk/app-release.apk
