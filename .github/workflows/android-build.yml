name: Build Flutter APK

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.24.0"
          channel: stable

      - name: Extract project ZIP
        run: |
          unzip -o abtin_navigator.zip

      - name: Get packages
        working-directory: abtin_navigator
        run: |
          flutter pub get

      - name: Build APK
        working-directory: abtin_navigator
        run: |
          flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: abtin-navigator-apk
          path: abtin_navigator/build/app/outputs/flutter-apk/app-release.apk
