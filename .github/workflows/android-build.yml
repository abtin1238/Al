name: Flutter APK Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.24.0"
          channel: stable

      - name: Recreate Android project
        run: |
          flutter create --platforms android --project-name abtin_navigator .

      - name: Fix geolocator version
        run: |
          sed -i 's/geolocator:.*/geolocator: ^13.0.2/' pubspec.yaml

      - name: Get Flutter packages
        run: |
          flutter pub get

      - name: Build APK
        run: |
          flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: abtin-navigator-apk
          path: build/app/outputs/flutter-apk/app-release.apk
