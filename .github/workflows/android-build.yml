name: Flutter APK Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.24.0"
          channel: stable

      - name: Recreate Android
        run: |
          flutter create --platforms android --project-name abtin_navigator .

      - name: Fix Android compileSdk
        run: |
          sed -i 's/compileSdk = .*/compileSdk = 35/' android/app/build.gradle
          sed -i 's/compileSdkVersion .*/compileSdkVersion 35/' android/app/build.gradle

      - name: Get packages
        run: |
          flutter pub get

      - name: Build APK
        run: |
          flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: abtin-navigator-apk
          path: build/app/outputs/flutter-apk/app-release.apk
