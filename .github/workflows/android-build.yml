name: Android Build

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.0'
          channel: 'stable'
          cache: true

      - name: Recreate Android
        run: flutter create --platforms android --project-name abtin_navigator .

      - name: Fix Android SDK config
        run: |
          sed -i 's/compileSdk = .*/compileSdk = 36/' android/app/build.gradle.kts
          sed -i 's/compileSdkVersion .*/compileSdkVersion 36/' android/app/build.gradle.kts
          sed -i 's/minSdk = .*/minSdk = 24/' android/app/build.gradle.kts
          sed -i 's/minSdkVersion .*/minSdkVersion 24/' android/app/build.gradle.kts
          sed -i 's/ndkVersion = .*/ndkVersion = "27.0.12077973"/' android/app/build.gradle.kts

      - name: Get packages
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error
