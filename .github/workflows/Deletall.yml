name: Clean Repository

on:
  workflow_dispatch:

jobs:
  clean:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Delete everything except workflows
        run: |
          find . -mindepth 1 \
            -not -path './.git*' \
            -not -path './.github' \
            -not -path './.github/*' \
            -exec rm -rf {} +

      - name: Commit changes
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"

          git add .
          git commit -m "Clean repository except workflows" || echo "Nothing to commit"
          git push
