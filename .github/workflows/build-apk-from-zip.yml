name: Build Abtin APK from ZIP (small, split-per-abi)

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract project from zip
        run: |
          mkdir -p extracted
          unzip -oq abtin_navigator_fixed.zip -d extracted
          if [ ! -f extracted/pubspec.yaml ]; then
            inner_dir=$(find extracted -maxdepth 1 -mindepth 1 -type d | head -n 1)
            if [ -f "$inner_dir/pubspec.yaml" ]; then
              mv "$inner_dir"/* extracted/
            fi
          fi
          test -f extracted/pubspec.yaml || (echo "pubspec.yaml not found in zip" && exit 1)

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: "3.32.0"
          cache: true

      - name: Generate platform folders
        working-directory: extracted
        run: flutter create --platforms=android,ios --org ir.abtin --project-name abtin_navigator .

      - name: Fix Android SDK config
        working-directory: extracted
        run: |
          sed -i 's/compileSdk = .*/compileSdk = 36/' android/app/build.gradle.kts
          sed -i 's/compileSdkVersion .*/compileSdkVersion 36/' android/app/build.gradle.kts
          sed -i 's/minSdk = .*/minSdk = 24/' android/app/build.gradle.kts
          sed -i 's/minSdkVersion .*/minSdkVersion 24/' android/app/build.gradle.kts
          sed -i 's/ndkVersion = .*/ndkVersion = "27.0.12077973"/' android/app/build.gradle.kts

      - name: Get dependencies
        working-directory: extracted
        run: flutter pub get

      - name: Generate app icon (آبتین)
        working-directory: extracted
        run: dart run flutter_launcher_icons

      - name: Enable code & resource shrinking
        working-directory: extracted
        run: |
          GRADLE=android/app/build.gradle.kts
          if ! grep -q "isMinifyEnabled = true" $GRADLE; then
            sed -i '/getByName("release")/a\            isMinifyEnabled = true\n            isShrinkResources = true\n            proguardFiles(getDefaultProguardFile("proguard-android-optimize.txt"), "proguard-rules.pro")' $GRADLE
          fi
          cp build_config/proguard-rules.pro android/app/proguard-rules.pro || true

      - name: Build split-per-abi release APKs
        working-directory: extracted
        run: >
          flutter build apk --release
          --split-per-abi
          --tree-shake-icons
          --obfuscate
          --split-debug-info=build/symbols

      - name: Upload APKs
        uses: actions/upload-artifact@v4
        with:
          name: abtin-apks
          path: extracted/build/app/outputs/flutter-apk/*.apk
