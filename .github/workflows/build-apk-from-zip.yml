name: Build Abtin APK from ZIP (small, split-per-abi)

# با هر push یا اجرای دستی، پروژه از abtin_navigator.zip استخراج و APK ساخته می‌شود.
on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract project from zip
        run: |
          mkdir -p extracted
          unzip -oq abtin_navigator_fixed.zip -d extracted
          # اگر zip یک پوشه‌ی ریشه‌ی اضافه داشته باشد (مثلاً abtin_navigator/)، پیدا و صاف می‌شود
          if [ ! -f extracted/pubspec.yaml ]; then
            inner_dir=$(find extracted -maxdepth 1 -mindepth 1 -type d | head -n 1)
            if [ -f "$inner_dir/pubspec.yaml" ]; then
              mv "$inner_dir"/* extracted/
            fi
          fi
          test -f extracted/pubspec.yaml || (echo "pubspec.yaml not found in zip" && exit 1)

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: "3.24.0"

      # چون پوشه‌های android/ و ios/ در zip نیستند، اینجا ساخته می‌شوند.
      - name: Generate platform folders
        working-directory: extracted
        run: flutter create --platforms=android,ios --org ir.abtin --project-name abtin_navigator .

      - name: Get dependencies
        working-directory: extracted
        run: flutter pub get

      - name: Generate app icon (آبتین)
        working-directory: extracted
        run: dart run flutter_launcher_icons

      # فعال‌سازی R8/Shrink برای کاهش حجم (تزریق به build.gradle ساخته‌شده)
      - name: Enable code & resource shrinking
        working-directory: extracted
        run: |
          GRADLE=android/app/build.gradle
          if ! grep -q "minifyEnabled true" $GRADLE; then
            sed -i '/release {/a\            minifyEnabled true\n            shrinkResources true\n            proguardFiles getDefaultProguardFile("proguard-android-optimize.txt"), "proguard-rules.pro"' $GRADLE
          fi
          cp build_config/proguard-rules.pro android/app/proguard-rules.pro || true

      - name: Build split-per-abi release APKs
        working-directory: extracted
        run: >
          flutter build apk --release
          --split-per-abi
          --tree-shake-icons
          --obfuscate
          --split-debug-info=build/symbols

      - name: Upload APKs
        uses: actions/upload-artifact@v4
        with:
          name: abtin-apks
          path: extracted/build/app/outputs/flutter-apk/*.apk
