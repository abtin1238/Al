name: Build Flutter APK From ZIP

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install unzip
        run: sudo apt-get update && sudo apt-get install -y unzip

      - name: Extract project
        run: |
          mkdir extracted
          unzip "*.zip" -d extracted

      - name: Find Flutter project
        working-directory: extracted
        run: |
          if [ ! -f pubspec.yaml ]; then
            PROJECT=$(find . -name pubspec.yaml | head -1 | xargs dirname)
            cp -r "$PROJECT"/* .
          fi

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.24.0"
          cache: true

      - name: Flutter Doctor
        working-directory: extracted
        run: flutter doctor -v

      - name: Get Packages
        working-directory: extracted
        run: flutter pub get

      - name: Build APK
        working-directory: extracted
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: extracted/build/app/outputs/flutter-apk/*.apk
