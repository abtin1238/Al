name: abtin_navigator
description: "آبتین - مسیریاب هوشمند آفلاین | Aabtin Offline Smart Navigator"
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management (Clean Architecture)
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Map engine (OpenStreetMap / Vector / Offline MBTiles)
  flutter_map: ^7.0.0
  latlong2: ^0.9.1
  flutter_map_tile_caching: ^9.1.4

  # Online geocoding (جستجو) و مسیریابی واقعی (OSRM) — درخواست‌های شبکه
  http: ^1.2.2

  # Local database (SQLite + Drift + encryption)
  drift: ^2.16.0
  sqlcipher_flutter_libs: ^0.6.0
  path_provider: ^2.1.5
  path: ^1.9.1

  # Cache
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Location / GPS
  geolocator: ^11.0.0
  flutter_compass: ^0.8.0
  sensors_plus: ^6.0.1

  # Offline voice (TTS / STT)
  flutter_tts: ^4.0.2

  # 3D vehicle model (GLB)
  flutter_cube: ^0.1.1

  # Utils
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0
  intl: ^0.20.2
  shared_preferences: ^2.2.3
  permission_handler: ^11.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.9
  drift_dev: ^2.16.0
  riverpod_generator: ^2.4.0
  freezed: ^2.5.2
  json_serializable: ^6.8.0
  flutter_launcher_icons: ^0.13.1

# ---- آیکون برنامه «آبتین» (لوگوی مسیریاب حرفه‌ای) ----
# اجرا: dart run flutter_launcher_icons
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/app_icon.png"
  min_sdk_android: 24
  remove_alpha_ios: true
  background_color_ios: "#0A0E1A"
  adaptive_icon_background: "#0A0E1A"
  adaptive_icon_foreground: "assets/icons/app_icon.png"

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
    - assets/gauges/
  fonts:
    - family: Vazirmatn
      fonts:
        - asset: assets/fonts/Vazirmatn-Regular.ttf
        - asset: assets/fonts/Vazirmatn-Medium.ttf
          weight: 500
        - asset: assets/fonts/Vazirmatn-Bold.ttf
          weight: 700
