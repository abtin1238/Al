name: Build Abtin APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: "3.24.5"
          cache: true

      - name: Flutter doctor
        run: flutter doctor -v

      # اگر android/ios از قبل در ریپو باشد، create آن‌ها را حفظ/به‌روز می‌کند
      - name: Ensure platform folders
        run: |
          flutter create --platforms=android,ios --org ir.abtin --project-name abtin_navigator .
          # minSdk 24 برای SQLCipher / geolocator
          if [ -f android/app/build.gradle ]; then
            sed -i 's/minSdkVersion flutter.minSdkVersion/minSdkVersion 24/' android/app/build.gradle || true
            sed -i 's/minSdk = flutter.minSdkVersion/minSdk = 24/' android/app/build.gradle || true
            sed -i 's/minSdkVersion [0-9]\+/minSdkVersion 24/' android/app/build.gradle || true
          fi
          if [ -f android/app/build.gradle.kts ]; then
            sed -i 's/minSdk = flutter.minSdkVersion/minSdk = 24/' android/app/build.gradle.kts || true
            sed -i 's/minSdk = [0-9]\+/minSdk = 24/' android/app/build.gradle.kts || true
          fi

      - name: Merge native Android MainActivity (if present in repo)
        run: |
          SRC="android/app/src/main/kotlin/ir/abtin/navigator/MainActivity.kt"
          if [ -f "$SRC" ]; then
            echo "Using repo MainActivity.kt"
          fi
          # packagingOptions برای SQLCipher .so
          GRADLE=""
          if [ -f android/app/build.gradle ]; then GRADLE=android/app/build.gradle; fi
          if [ -f android/app/build.gradle.kts ]; then GRADLE=android/app/build.gradle.kts; fi
          if [ -n "$GRADLE" ] && ! grep -q "jniLibs.useLegacyPackaging" "$GRADLE"; then
            echo "Note: ensure jni packaging for SQLCipher if link fails"
          fi

      - name: Get dependencies
        run: |
          flutter pub get
          flutter pub deps | head -n 40

      - name: Generate app icon
        run: dart run flutter_launcher_icons || true

      # تست‌های واحد pure-Dart (بدون geolocator/plugin)
      - name: Unit tests (offline core)
        run: |
          flutter test test/routing_engine_test.dart test/offline_complete_test.dart --reporter expanded

      - name: Enable R8 shrink (optional size cut)
        run: |
          set +e
          for GRADLE in android/app/build.gradle android/app/build.gradle.kts; do
            [ -f "$GRADLE" ] || continue
            if ! grep -q "minifyEnabled true\|isMinifyEnabled = true" "$GRADLE"; then
              if [[ "$GRADLE" == *.kts ]]; then
                sed -i '/release {/a\            isMinifyEnabled = false\n            isShrinkResources = false' "$GRADLE"
              else
                sed -i '/release {/a\            minifyEnabled false\n            shrinkResources false' "$GRADLE"
              fi
            fi
          done
          cp -f build_config/proguard-rules.pro android/app/proguard-rules.pro 2>/dev/null || true

      # minify خاموش تا خطای R8/ProGuard بیلد را نشکند
      - name: Build release APK (split-per-abi)
        run: |
          flutter build apk --release --split-per-abi --tree-shake-icons

      - name: List APKs
        run: ls -lah build/app/outputs/flutter-apk/ || true

      - name: Upload APKs
        uses: actions/upload-artifact@v4
        with:
          name: abtin-apks
          path: build/app/outputs/flutter-apk/*.apk
          if-no-files-found: error
