name: Build Abtin APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter version info
        run: flutter --version

      # ساخت پوشه‌های android (بدون ios چون لازم نداریم)
      - name: Generate platform folders
        run: |
          flutter create --platforms=android --org ir.abtin --project-name abtin_navigator .

      # اضافه کردن مجوزهای لازم به AndroidManifest
      - name: Patch AndroidManifest permissions
        run: |
          MANIFEST=android/app/src/main/AndroidManifest.xml
          add_permission() {
            grep -q "$1" $MANIFEST || \
              sed -i "s|<application|<uses-permission android:name=\"$1\"/>\n    <application|" $MANIFEST
          }
          add_permission "android.permission.INTERNET"
          add_permission "android.permission.ACCESS_FINE_LOCATION"
          add_permission "android.permission.ACCESS_COARSE_LOCATION"
          add_permission "android.permission.ACCESS_BACKGROUND_LOCATION"
          add_permission "android.permission.HIGH_SAMPLING_RATE_SENSORS"
          echo "=== Manifest after patch ==="
          cat $MANIFEST

      - name: Get dependencies
        run: flutter pub get

      # آیکون فقط برای Android (ios نداریم)
      - name: Generate app icon (Android only)
        run: |
          # موقتاً ios را از config حذف می‌کنیم
          sed -i 's/^  ios: true/  ios: false/' pubspec.yaml
          dart run flutter_launcher_icons || true
          # برگردوندن به حالت اصلی
          sed -i 's/^  ios: false/  ios: true/' pubspec.yaml

      # R8 shrink — سازگار با هر دو build.gradle و build.gradle.kts
      - name: Enable R8 shrinking
        run: |
          # تشخیص Kotlin DSL یا Groovy
          if [ -f android/app/build.gradle.kts ]; then
            GRADLE=android/app/build.gradle.kts
            echo "Using Kotlin DSL: $GRADLE"
            # در KTS از isMinifyEnabled = true استفاده می‌شه
            if ! grep -q "isMinifyEnabled" $GRADLE; then
              sed -i '/release {/a\            isMinifyEnabled = true\n            isShrinkResources = true\n            proguardFiles(getDefaultProguardFile("proguard-android-optimize.txt"), "proguard-rules.pro")' $GRADLE
            fi
          elif [ -f android/app/build.gradle ]; then
            GRADLE=android/app/build.gradle
            echo "Using Groovy DSL: $GRADLE"
            if ! grep -q "minifyEnabled true" $GRADLE; then
              sed -i '/release {/a\            minifyEnabled true\n            shrinkResources true\n            proguardFiles getDefaultProguardFile("proguard-android-optimize.txt"), "proguard-rules.pro"' $GRADLE
            fi
          else
            echo "WARNING: No build.gradle found, skipping R8"
          fi
          # کپی proguard rules
          [ -f build_config/proguard-rules.pro ] && \
            cp build_config/proguard-rules.pro android/app/proguard-rules.pro || \
            touch android/app/proguard-rules.pro

      - name: Analyze (non-fatal)
        run: flutter analyze --no-fatal-infos || true

      - name: Build split-per-abi release APKs
        run: |
          flutter build apk \
            --release \
            --split-per-abi \
            --tree-shake-icons \
            --obfuscate \
            --split-debug-info=build/symbols

      - name: List APKs
        run: ls -lh build/app/outputs/flutter-apk/*.apk

      - name: Upload APKs
        uses: actions/upload-artifact@v4
        with:
          name: abtin-apks-${{ github.run_number }}
          path: build/app/outputs/flutter-apk/*.apk
          retention-days: 30

      - name: Upload debug symbols
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: debug-symbols-${{ github.run_number }}
          path: build/symbols/
          retention-days: 7
