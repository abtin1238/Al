name: Build Abtin APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      # ساخت پوشه‌های android/ios چون در مخزن نیستند
      - name: Generate platform folders
        run: |
          flutter create --platforms=android --org ir.abtin --project-name abtin_navigator .

      # اضافه کردن مجوزهای لازم به AndroidManifest
      - name: Patch AndroidManifest permissions
        run: |
          MANIFEST=android/app/src/main/AndroidManifest.xml
          # اینترنت
          grep -q "INTERNET" $MANIFEST || \
            sed -i 's|<manifest|<manifest xmlns:tools="http://schemas.android.com/tools"|' $MANIFEST | true
          grep -q "INTERNET" $MANIFEST || \
            sed -i '/<manifest/a\    <uses-permission android:name="android.permission.INTERNET"/>' $MANIFEST
          # GPS
          grep -q "ACCESS_FINE_LOCATION" $MANIFEST || \
            sed -i '/<manifest/a\    <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION"/>' $MANIFEST
          grep -q "ACCESS_COARSE_LOCATION" $MANIFEST || \
            sed -i '/<manifest/a\    <uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION"/>' $MANIFEST
          grep -q "ACCESS_BACKGROUND_LOCATION" $MANIFEST || \
            sed -i '/<manifest/a\    <uses-permission android:name="android.permission.ACCESS_BACKGROUND_LOCATION"/>' $MANIFEST
          # قطب‌نما
          grep -q "HIGH_SAMPLING_RATE_SENSORS" $MANIFEST || \
            sed -i '/<manifest/a\    <uses-permission android:name="android.permission.HIGH_SAMPLING_RATE_SENSORS"/>' $MANIFEST
          echo "=== AndroidManifest.xml ==="
          cat $MANIFEST

      - name: Get dependencies
        run: flutter pub get

      - name: Generate app icon
        run: dart run flutter_launcher_icons
        continue-on-error: true

      # R8 shrink برای کاهش حجم APK
      - name: Enable R8 shrinking
        run: |
          GRADLE=android/app/build.gradle
          if ! grep -q "minifyEnabled true" $GRADLE; then
            sed -i '/buildTypes {/,/^    }/{
              /release {/a\            minifyEnabled true\n            shrinkResources true\n            proguardFiles getDefaultProguardFile("proguard-android-optimize.txt"), "proguard-rules.pro"
            }' $GRADLE
          fi
          # کپی proguard rules اگه وجود داشت
          [ -f build_config/proguard-rules.pro ] && \
            cp build_config/proguard-rules.pro android/app/proguard-rules.pro || \
            touch android/app/proguard-rules.pro

      # analyze قبل از build تا خطاها زودتر دیده بشن
      - name: Analyze
        run: flutter analyze --no-fatal-infos
        continue-on-error: true

      - name: Build split-per-abi release APKs
        run: |
          flutter build apk \
            --release \
            --split-per-abi \
            --tree-shake-icons \
            --obfuscate \
            --split-debug-info=build/symbols

      - name: List APKs
        run: ls -lh build/app/outputs/flutter-apk/*.apk

      - name: Upload APKs
        uses: actions/upload-artifact@v4
        with:
          name: abtin-apks-${{ github.run_number }}
          path: build/app/outputs/flutter-apk/*.apk
          retention-days: 30

      - name: Upload debug symbols
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: debug-symbols-${{ github.run_number }}
          path: build/symbols/
          retention-days: 7
